<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Review flagged high-confidence ECG diagnostic alerts. Filter by severity, resolve alerts, and cross-link to full waveform results."
    />
    <title>Alerts — ECG Triage</title>
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- Auth guard -->
    <script type="module">
      import { requireAuth } from "./js/auth.js";
      if (!requireAuth()) throw new Error("Unauthenticated");
    </script>
  </head>
  <body>
    <div id="app-shell" class="app-shell">
      <!-- Shared navigation -->
      <div id="nav-container"></div>

      <!-- Main content -->
      <main class="content-area" id="alerts-main">
        <div class="alerts-page">
          <!-- Page header -->
          <div class="alerts-page__header">
            <h1 class="alerts-page__title">Alerts</h1>
            <div
              id="unreviewed-count"
              class="alert-count-badge"
              aria-live="polite"
            ></div>
          </div>

          <!-- Filter pills -->
          <div
            id="alerts-filter-bar"
            class="alerts-filter-bar"
            role="group"
            aria-label="Filter alerts"
          >
            <button
              id="filter-all"
              class="filter-btn filter-btn--active"
              data-filter="all"
              aria-pressed="true"
            >
              All <span class="filter-btn__count" id="count-all"></span>
            </button>
            <button
              id="filter-critical"
              class="filter-btn"
              data-filter="critical"
              aria-pressed="false"
            >
              Critical
              <span class="filter-btn__count" id="count-critical"></span>
            </button>
            <button
              id="filter-warning"
              class="filter-btn"
              data-filter="warning"
              aria-pressed="false"
            >
              Warning <span class="filter-btn__count" id="count-warning"></span>
            </button>
            <button
              id="filter-info"
              class="filter-btn"
              data-filter="info"
              aria-pressed="false"
            >
              Info <span class="filter-btn__count" id="count-info"></span>
            </button>
            <button
              id="filter-reviewed"
              class="filter-btn"
              data-filter="reviewed"
              aria-pressed="false"
            >
              Resolved
            </button>
          </div>

          <!-- Loading state -->
          <div id="alerts-loading" aria-label="Loading alerts">
            <div
              class="skeleton"
              style="height: 88px; border-radius: 10px; margin-bottom: 12px"
            ></div>
            <div
              class="skeleton"
              style="height: 88px; border-radius: 10px; margin-bottom: 12px"
            ></div>
            <div
              class="skeleton"
              style="height: 88px; border-radius: 10px"
            ></div>
          </div>

          <!-- Alert list -->
          <div id="alerts-list" role="list" aria-label="Alert list"></div>

          <!-- Empty state -->
          <div
            id="alerts-empty"
            style="display: none"
            class="empty-state"
            aria-live="polite"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
              width="48"
              height="48"
              style="color: var(--color-text-secondary); margin-bottom: 12px"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
              />
            </svg>
            <h2
              style="
                font-size: 1rem;
                margin: 0 0 4px;
                color: var(--color-text-primary);
              "
            >
              No alerts match the current filter
            </h2>
            <p
              style="
                font-size: 0.8125rem;
                color: var(--color-text-secondary);
                margin: 0;
              "
            >
              Try a different filter, or all alerts may have been resolved.
            </p>
          </div>
        </div>
        <!-- /.alerts-page -->
      </main>
    </div>
    <!-- /#app-shell -->

    <script type="module">
      import { injectNav } from "./js/components/nav.js";
      import { showToast } from "./js/components/toast.js";
      import "./js/alerts.js";

      injectNav(document.getElementById("nav-container"));

      window.addEventListener("unhandledrejection", (event) => {
        const err = event.reason;
        if (err?.status === 401) {
          window.location.href = "login.html";
          return;
        }
        showToast(err?.message || "An unexpected error occurred.", "error");
      });
    </script>
  </body>
</html>

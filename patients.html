<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse, search, and filter all registered ECG Triage patients. Click any patient to view their full record and prediction history.">
  <title>Patients — ECG Triage</title>
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Auth guard -->
  <script type="module">
    import { requireAuth } from './js/auth.js';
    if (!requireAuth()) throw new Error('Unauthenticated');
  </script>
</head>
<body>

<div id="app-shell" class="app-shell">

  <!-- Shared navigation -->
  <div id="nav-container"></div>

  <!-- Main content -->
  <main class="content-area">
    <div class="patients-page">

      <!-- Page header -->
      <div class="patients-page__header">
        <div>
          <h1 class="patients-page__title">Patients</h1>
          <p class="patients-page__subtitle" id="patients-count-label">Loading…</p>
        </div>
        <a href="/upload.html" class="btn btn--primary btn--sm" id="btn-new-ecg">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
          New ECG Upload
        </a>
      </div>

      <!-- Table card -->
      <div class="card" style="padding:0;overflow:hidden" aria-label="Patient list">

        <!-- Toolbar -->
        <div class="table-toolbar">
          <div class="search-wrapper">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              id="patients-search"
              class="form-input"
              type="search"
              placeholder="Search by name or ID…"
              aria-label="Search patients"
              style="padding-left:40px"
            >
          </div>
          <span id="pagination-info" class="text-secondary text-sm" aria-live="polite"></span>
        </div>

        <!-- Loading skeletons (replaced by JS) -->
        <div id="patients-loading" style="padding:var(--space-4)">
          <!-- Skeleton cards injected by patients.js -->
        </div>

        <!-- Populated table -->
        <div id="patients-table-wrap" style="display:none">
          <table class="data-table" id="patients-table" aria-label="Registered patients">
            <thead>
              <tr>
                <th scope="col">Patient</th>
                <th scope="col">ID</th>
                <th scope="col">Date of Birth</th>
                <th scope="col">Last Prediction</th>
                <th scope="col">Predictions</th>
                <th scope="col"><span class="sr-only">Actions</span></th>
              </tr>
            </thead>
            <tbody id="patients-tbody"></tbody>
          </table>

          <!-- Pagination -->
          <div class="pagination" aria-label="Pagination controls">
            <span id="pagination-info-footer" class="text-secondary text-sm"></span>
            <div class="pagination__controls">
              <button
                id="btn-page-prev"
                class="pagination__btn"
                aria-label="Previous page"
                disabled
              >← Prev</button>

              <div id="page-buttons" style="display:flex;gap:var(--space-1)"></div>

              <button
                id="btn-page-next"
                class="pagination__btn"
                aria-label="Next page"
              >Next →</button>
            </div>
          </div>
        </div>

        <!-- Empty state -->
        <div id="patients-empty" class="patients-empty" style="display:none" aria-live="polite">
          <svg class="patients-empty__icon" xmlns="http://www.w3.org/2000/svg"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"
               aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/>
          </svg>
          <h2 class="patients-empty__title">No patients found</h2>
          <p class="patients-empty__hint">Try adjusting your search term, or upload a new ECG to register a patient.</p>
          <a href="/upload.html" class="btn btn--ghost btn--sm">Upload ECG →</a>
        </div>

      </div><!-- /.card -->
    </div><!-- /.patients-page -->
  </main>
</div><!-- /#app-shell -->

<script type="module">
  import { injectNav }         from './js/components/nav.js';
  import { showToast }         from './js/components/toast.js';
  import { initPatientsPage }  from './js/patients.js';

  injectNav(document.getElementById('nav-container'));
  initPatientsPage();

  window.addEventListener('unhandledrejection', event => {
    const err = event.reason;
    if (err?.status === 401) { window.location.href = '/login.html'; return; }
    showToast(err?.message || 'An unexpected error occurred.', 'error');
  });
</script>

</body>
</html>

<div id="test-sandbox" style="display:none"></div>

<script type="module">
// ─── Micro test runner (same as Sprint 2) ───────────────────────────────────
const suites = [];
let currentSuite = null;

function describe(name, fn) {
  currentSuite = { name, tests: [] };
  suites.push(currentSuite);
  fn();
}
async function it(name, fn) {
  const test = { name, status: 'pending', detail: '' };
  currentSuite.tests.push(test);
  try { await fn(); test.status = 'pass'; }
  catch (err) { test.status = 'fail'; test.detail = err?.message ?? String(err); }
}
function assert(cond, msg)      { if (!cond)    throw new Error(msg ?? 'Assertion failed'); }
function assertEqual(a, b, msg) { if (a !== b)  throw new Error(msg ?? `Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); }
function assertDefined(v, msg)  { if (v == null) throw new Error(msg ?? 'Value is null/undefined'); }
function assertContains(str, sub, msg) { if (!String(str).includes(sub)) throw new Error(msg ?? `"${sub}" not found in result`); }
function assertThrows(fn, msg)  {
  let threw = false;
  try { fn(); } catch { threw = true; }
  if (!threw) throw new Error(msg ?? 'Expected function to throw but it did not');
}
async function assertRejects(fn, msg) {
  let threw = false;
  try { await fn(); } catch { threw = true; }
  if (!threw) throw new Error(msg ?? 'Expected async function to reject but it did not');
}

// ─── Module imports ──────────────────────────────────────────────────────────
let CONFIG, redirector, login, isAuthenticated;
let initUploadPage, handleUploadSubmit, setMode;
let renderWaveform, destroyWaveform;
let API;

try {
  ({ CONFIG }                                = await import('../js/config.js'));
  ({ redirector, login, isAuthenticated }   = await import('../js/auth.js'));
  ({ initUploadPage, handleUploadSubmit, setMode } = await import('../js/upload.js'));
  ({ renderWaveform, destroyWaveform }      = await import('../js/waveform.js'));
  ({ API }                                  = await import('../js/api-adapter.js'));
} catch (e) {
  document.getElementById('summary').innerHTML =
    `<span style="color:var(--color-danger)">⚠ Module import failed: ${e.message}</span>`;
  throw e;
}

// Stub all navigation so no redirect fires during tests
if (redirector) {
  redirector.navigate = (url) => {
    console.log(`[TEST] Intercepted redirect to: ${url}`);
  };
}

// Auth helpers
const TOKEN_KEY = CONFIG?.AUTH_TOKEN_KEY ?? 'ecg_auth_token';
const USER_KEY  = CONFIG?.AUTH_USER_KEY  ?? 'ecg_current_user';
function stubSession(token, user) {
  sessionStorage.setItem(TOKEN_KEY, token);
  sessionStorage.setItem(USER_KEY, JSON.stringify(user));
}
function clearSession() {
  sessionStorage.removeItem(TOKEN_KEY);
  sessionStorage.removeItem(USER_KEY);
}

// Log in if not already authenticated
if (!isAuthenticated()) {
  try { await login('demo', 'demo'); }
  catch (e) {
    document.getElementById('summary').innerHTML =
      `<span style="color:var(--color-danger)">⚠ Pre-auth failed: ${e.message}</span>`;
    throw e;
  }
}

const REAL_TOKEN = sessionStorage.getItem(TOKEN_KEY);
const REAL_USER  = JSON.parse(sessionStorage.getItem(USER_KEY) ?? 'null');
function restoreSession() {
  if (REAL_TOKEN) stubSession(REAL_TOKEN, REAL_USER);
  else clearSession();
}

// ─── before / after shim ────────────────────────────────────────────────────
// These must be defined before any describe() block that calls them.
function before(fn) { it('(setup)', fn); }
function after(fn)  { it('(teardown)', fn); }

// ─── Sandbox helpers ─────────────────────────────────────────────────────────
// Some upload.js functions interact with DOM IDs — we mount minimal DOM stubs
// in #test-sandbox before calling them and clean up after.

const sandbox = document.getElementById('test-sandbox');
function mountSandbox(html) { sandbox.innerHTML = html; sandbox.style.display = ''; }
function unmountSandbox()   { sandbox.innerHTML = ''; sandbox.style.display = 'none'; }

// Helper to create a mock File object
function makeFile(name, content, type = 'text/plain') {
  return new File([content], name, { type });
}

// ════════════════════════════════════════════════════════════════════════════

describe('config.js — upload & waveform constants', () => {

    assertEqual(CONFIG.MAX_FILE_SIZE_BYTES, 10 * 1024 * 1024);
  });
  it('CONFIG.MAX_TOTAL_UPLOAD_BYTES is 25 MB', () => {
    assertEqual(CONFIG.MAX_TOTAL_UPLOAD_BYTES, 25 * 1024 * 1024);
  });
  it('CONFIG.DISPLAY_POINTS_PER_LEAD is 1000', () => {
    assertEqual(CONFIG.DISPLAY_POINTS_PER_LEAD, 1000);
  });
  it('CONFIG.DEFAULT_LEAD_COUNT is 12', () => {
    assertEqual(CONFIG.DEFAULT_LEAD_COUNT, 12);
  });
  it('CONFIG.LEAD_LABELS has 12 entries', () => {
    assertEqual(CONFIG.LEAD_LABELS.length, 12);
  });
  it('CONFIG.LEAD_LABELS includes standard leads I, II, V1, V6', () => {
    ['I', 'II', 'V1', 'V6'].forEach(l =>
      assert(CONFIG.LEAD_LABELS.includes(l), `LEAD_LABELS missing ${l}`)
    );
  });
});

// ════════════════════════════════════════════════════════════════════════════
// 3. upload.js — setMode() DOM updates
// ════════════════════════════════════════════════════════════════════════════

describe('upload.js — setMode() UI switching', () => {
  // Mount the minimal DOM structure setMode() relies on
  before(() => mountSandbox(`
    <button class="upload-mode-btn active" data-mode="csv">CSV</button>
    <button class="upload-mode-btn"        data-mode="wfdb">WFDB</button>
    <div id="panel-csv"></div>
    <div id="panel-wfdb" style="display:none"></div>
    <div id="csv-file-info"  style="display:none"><span class="file-selected-info__name"></span><span class="file-selected-info__size"></span></div>
    <div id="dat-file-info"  style="display:none"><span class="file-selected-info__name"></span><span class="file-selected-info__size"></span></div>
    <div id="hea-file-info"  style="display:none"><span class="file-selected-info__name"></span><span class="file-selected-info__size"></span></div>
    <div id="error-csv"       style="display:none"></div>
    <div id="error-dat"       style="display:none"></div>
    <div id="error-hea"       style="display:none"></div>
    <div id="error-wfdb-pair" style="display:none"></div>
    <button id="btn-submit-upload" disabled></button>
    <input  id="input-patient-id" value="">
  `));

  it('setMode("wfdb") hides CSV panel and shows WFDB panel', () => {
    setMode('wfdb');
    const csvPanel  = document.getElementById('panel-csv');
    const wfdbPanel = document.getElementById('panel-wfdb');
    assertEqual(wfdbPanel.style.display, '', 'WFDB panel should be visible');
    assert(
      csvPanel.style.display === 'none',
      'CSV panel should be hidden'
    );
  });

  it('setMode("csv") hides WFDB panel and shows CSV panel', () => {
    setMode('csv');
    const csvPanel  = document.getElementById('panel-csv');
    const wfdbPanel = document.getElementById('panel-wfdb');
    assertEqual(csvPanel.style.display, '', 'CSV panel should be visible');
    assert(
      wfdbPanel.style.display === 'none',
      'WFDB panel should be hidden'
    );
  });

  it('setMode("csv") marks CSV button as active', () => {
    setMode('csv');
    const csvBtn  = document.querySelector('[data-mode="csv"]');
    const wfdbBtn = document.querySelector('[data-mode="wfdb"]');
    assert(csvBtn.classList.contains('active'),  'CSV button should be active');
    assert(!wfdbBtn.classList.contains('active'), 'WFDB button should not be active');
  });

  it('setMode("wfdb") marks WFDB button as active', () => {
    setMode('wfdb');
    const csvBtn  = document.querySelector('[data-mode="csv"]');
    const wfdbBtn = document.querySelector('[data-mode="wfdb"]');
    assert(wfdbBtn.classList.contains('active'), 'WFDB button should be active');
    assert(!csvBtn.classList.contains('active'), 'CSV button should not be active');
  });

  it('setMode() keeps submit button disabled when no file is selected', () => {
    setMode('csv');
    const btn = document.getElementById('btn-submit-upload');
    assert(btn.disabled, 'Submit button should remain disabled with no file');
  });

  after(() => unmountSandbox());
});

// 5. mock-api — uploadECGcsv / uploadECGwfdb integration
// ════════════════════════════════════════════════════════════════════════════

describe('API — uploadECGcsv() mock response', () => {
  it('resolves with an object containing prediction_id', async () => {
    const csvFile = makeFile('test.csv', 'lead1,lead2\n0.1,0.2', 'text/csv');
    const result  = await API.uploadECGcsv(csvFile, 'p_test');
    assertDefined(result,               'uploadECGcsv() returned nothing');
    assertDefined(result.prediction_id, 'prediction_id missing from response');
  });

  it('response contains diagnosis.primary_label', async () => {
    const csvFile = makeFile('test.csv', 'lead1,lead2\n0.1,0.2', 'text/csv');
    const result  = await API.uploadECGcsv(csvFile, 'p_test');
    assertDefined(result.diagnosis?.primary_label, 'diagnosis.primary_label missing');
  });

  it('response.diagnosis.confidence is between 0 and 1', async () => {
    const csvFile = makeFile('test.csv', 'data', 'text/csv');
    const result  = await API.uploadECGcsv(csvFile, 'p_test');
    const c = result.diagnosis?.confidence;
    assert(typeof c === 'number' && c >= 0 && c <= 1, `confidence ${c} out of [0,1]`);
  });

  it('response contains waveform_data with leads array', async () => {
    const csvFile = makeFile('test.csv', 'data', 'text/csv');
    const result  = await API.uploadECGcsv(csvFile, 'p_test');
    assertDefined(result.waveform_data?.leads, 'waveform_data.leads missing');
    assert(Array.isArray(result.waveform_data.leads), 'leads should be an array');
  });

  it('response contains waveform_data.signals (2-D array)', async () => {
    const csvFile = makeFile('test.csv', 'data', 'text/csv');
    const result  = await API.uploadECGcsv(csvFile, 'p_test');
    const sigs = result.waveform_data?.signals;
    assertDefined(sigs, 'waveform_data.signals missing');
    assert(Array.isArray(sigs) && Array.isArray(sigs[0]), 'signals should be 2D array');
  });

  it('leads.length === signals.length (array dimensions match)', async () => {
    const csvFile = makeFile('test.csv', 'data', 'text/csv');
    const result  = await API.uploadECGcsv(csvFile, 'p_test');
    const { leads, signals } = result.waveform_data;
    assertEqual(leads.length, signals.length, `leads[${leads.length}] ≠ signals[${signals.length}]`);
  });

  it('patient_id echoed back in response', async () => {
    const csvFile = makeFile('test.csv', 'data', 'text/csv');
    const result  = await API.uploadECGcsv(csvFile, 'p_echo_test');
    assertEqual(result.patient_id, 'p_echo_test', 'patient_id not echoed');
  });
});

describe('API — uploadECGwfdb() mock response', () => {
  it('resolves with prediction_id', async () => {
    const dat = makeFile('rec.dat', '\x00\x01\x02', 'application/octet-stream');
    const hea = makeFile('rec.hea', 'rec 12 500 1000', 'text/plain');
    const result = await API.uploadECGwfdb(dat, hea, 'p_wfdb');
    assertDefined(result.prediction_id);
  });

  it('diagnosis.secondary_labels is an array', async () => {
    const dat = makeFile('rec.dat', '\x00', 'application/octet-stream');
    const hea = makeFile('rec.hea', 'rec 12', 'text/plain');
    const result = await API.uploadECGwfdb(dat, hea, 'p_wfdb');
    assert(
      Array.isArray(result.diagnosis?.secondary_labels),
      'secondary_labels should be an array'
    );
  });
});

// 6. API — getPrediction()
// ════════════════════════════════════════════════════════════════════════════

describe('API — getPrediction() mock response', () => {
  let prediction;

  it('resolves with an object', async () => {
    prediction = await API.getPrediction('pred_test_001');
    assertDefined(prediction, 'getPrediction() returned nothing');
  });

  it('prediction_id field is present', () => {
    assertDefined(prediction?.prediction_id);
  });

  it('diagnosis.primary_label is a non-empty string', () => {
    const label = prediction?.diagnosis?.primary_label;
    assert(typeof label === 'string' && label.length > 0, `primary_label: ${label}`);
  });

  it('diagnosis.confidence is between 0 and 1', () => {
    const c = prediction?.diagnosis?.confidence;
    assert(typeof c === 'number' && c >= 0 && c <= 1, `confidence ${c} out of range`);
  });

  it('diagnosis.secondary_labels is a non-empty array', () => {
    const sl = prediction?.diagnosis?.secondary_labels;
    assert(Array.isArray(sl) && sl.length > 0, 'secondary_labels empty or missing');
  });

  it('each secondary label has label (string) and confidence (number)', () => {
    prediction.diagnosis.secondary_labels.forEach((s, i) => {
      assert(typeof s.label === 'string', `secondary_labels[${i}].label not string`);
      assert(typeof s.confidence === 'number', `secondary_labels[${i}].confidence not number`);
    });
  });

  it('waveform_data.leads has 12 entries', () => {
    assertEqual(prediction?.waveform_data?.leads?.length, 12);
  });

  it('waveform_data.sampling_rate is a positive number', () => {
    const sr = prediction?.waveform_data?.sampling_rate;
    assert(typeof sr === 'number' && sr > 0, `sampling_rate invalid: ${sr}`);
  });

  it('waveform_data.signals is a 12×N 2D array', () => {
    const sigs = prediction?.waveform_data?.signals;
    assertEqual(sigs?.length, 12);
    sigs.forEach((lead, i) => {
      assert(Array.isArray(lead) && lead.length > 0, `signals[${i}] is empty or not an array`);
    });
  });

  it('metadata.duration_seconds is present', () => {
    assertDefined(prediction?.metadata?.duration_seconds);
  });

  it('status field equals "success"', () => {
    assertEqual(prediction?.status, 'success');
  });
});

// 8. waveform.js — renderWaveform() behavior
// ════════════════════════════════════════════════════════════════════════════

describe('waveform.js — renderWaveform() with valid data', () => {
  const CONTAINER_ID = 'wf-test-container';

  before(() => mountSandbox(`
    <div id="${CONTAINER_ID}" class="waveform-container" style="width:600px;height:300px"></div>
  `));

  // Build a minimal valid waveform_data matching mock-api shape
  const waveformData = {
    leads: ['I', 'II', 'III'],
    signals: [
      Array.from({ length: 500 }, (_, t) => Math.sin(t / 50)),
      Array.from({ length: 500 }, (_, t) => Math.cos(t / 50)),
      Array.from({ length: 500 }, (_, t) => Math.sin(t / 40) * 0.8),
    ],
    sampling_rate: 500,
  };

  it('renderWaveform() does not throw with valid data', () => {
    let threw = false;
    try { renderWaveform(CONTAINER_ID, waveformData); }
    catch (e) { threw = true; console.error(e); }
    assert(!threw, 'renderWaveform() threw with valid data');
  });

  it('container is non-empty after renderWaveform()', () => {
    const el = document.getElementById(CONTAINER_ID);
    // Either Plotly populated it (has children or inline styles added by Plotly)
    // OR the fallback message was shown — either way innerHTML must be non-empty
    assert((el?.innerHTML ?? '').length > 0, 'Container is empty after renderWaveform()');
  });

  it('destroyWaveform() does not throw', () => {
    let threw = false;
    try { destroyWaveform(CONTAINER_ID); } catch { threw = true; }
    assert(!threw, 'destroyWaveform() threw');
  });

  after(() => unmountSandbox());
});

describe('waveform.js — renderWaveform() fallback cases', () => {
  const CONTAINER_ID = 'wf-fallback-container';

  before(() => mountSandbox(`
    <div id="${CONTAINER_ID}" class="waveform-container"></div>
  `));

  it('renders fallback when waveformData is null', () => {
    renderWaveform(CONTAINER_ID, null);
    const el = document.getElementById(CONTAINER_ID);
    assertContains(el?.innerHTML ?? '', 'waveform-fallback', 'Fallback not shown for null data');
  });

  it('renders fallback when leads/signals length mismatch', () => {
    renderWaveform(CONTAINER_ID, {
      leads: ['I', 'II'],
      signals: [[0.1, 0.2]],   // only 1 signal for 2 leads
      sampling_rate: 500,
    });
    const el = document.getElementById(CONTAINER_ID);
    assertContains(el?.innerHTML ?? '', 'waveform-fallback', 'Fallback not shown for length mismatch');
  });

  after(() => unmountSandbox());
});

// 9. upload.html — DOM structure (fetch + DOMParser)

describe('upload.html — DOM structure', () => {
  let doc;

  it('fetches upload.html with HTTP 200', async () => {
    const res = await fetch('/upload.html');
    assertEqual(res.status, 200, `upload.html returned ${res.status}`);
    doc = new DOMParser().parseFromString(await res.text(), 'text/html');
  });

  it('<title> contains "Upload ECG"', () =>
    assertContains(doc?.title, 'Upload ECG'));

  it('#app-shell exists', () =>
    assertDefined(doc?.getElementById('app-shell')));

  it('#nav-container exists', () =>
    assertDefined(doc?.getElementById('nav-container')));

  it('CSV mode button present (data-mode="csv")', () =>
    assertDefined(doc?.querySelector('[data-mode="csv"]')));

  it('WFDB mode button present (data-mode="wfdb")', () =>
    assertDefined(doc?.querySelector('[data-mode="wfdb"]')));

  it('#panel-csv exists', () =>

// ════════════════════════════════════════════════════════════════════════════
// ─── Render results ──────────────────────────────────────────────────────────
function renderResults() {
  const container = document.getElementById('results');
  let pass = 0, fail = 0;

  suites.forEach(suite => {
    const div = document.createElement('div');
    div.className = 'suite';
    div.innerHTML = `<div class="suite-title">${suite.name}</div>`;
    suite.tests.forEach(t => {
      const row = document.createElement('div');
      row.className = `test-row ${t.status}`;
      row.innerHTML = `
        <span class="test-status">${t.status === 'pass' ? 'PASS' : t.status === 'fail' ? 'FAIL' : 'SKIP'}</span>
        <div>
          <div class="test-name">${t.name}</div>
          ${t.detail ? `<div class="test-detail">${t.detail}</div>` : ''}
        </div>`;
      div.appendChild(row);
      if (t.status === 'pass') pass++; else if (t.status === 'fail') fail++;
    });
    container.appendChild(div);
  });

  const total = suites.flatMap(s => s.tests).length;
  const ok = fail === 0;
  document.getElementById('summary').innerHTML = `
    <strong style="color:${ok ? 'var(--color-accent)' : 'var(--color-danger)'}">
      ${ok ? '✓ All tests passed' : '✕ Some tests failed'}
    </strong>
    <span>${pass} / ${total} passed</span>
    ${fail > 0 ? `<span style="color:var(--color-danger)">${fail} failed</span>` : ''}
  `;
}

await Promise.resolve();
renderResults();
</script>

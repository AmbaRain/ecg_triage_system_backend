<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View, write, and export clinical ECG prediction reports. Filter by date range, generate new reports per patient, and download as CSV."
    />
    <title>Reports — ECG Triage</title>
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- Auth guard -->
    <script type="module">
      import { requireAuth } from "./js/auth.js";
      if (!requireAuth()) throw new Error("Unauthenticated");
    </script>
  </head>
  <body>
    <div id="app-shell" class="app-shell">
      <!-- Shared navigation -->
      <div id="nav-container"></div>

      <!-- Main content -->
      <main class="content-area">
        <div class="reports-page">
          <!-- Page header -->
          <div class="reports-page__header">
            <h1 class="reports-page__title">Reports</h1>
            <button id="btn-generate-report" class="btn btn--primary btn--sm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
                width="16"
                height="16"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4.5v15m7.5-7.5h-15"
                />
              </svg>
              Generate Report
            </button>
          </div>

          <!-- Summary stats bar -->
          <div id="reports-summary" class="reports-summary-bar">
            <div class="summary-stat">
              <span class="summary-stat__value" id="stat-total-reports">—</span>
              <span class="summary-stat__label">Reports</span>
            </div>
            <div class="summary-stat">
              <span class="summary-stat__value" id="stat-total-predictions"
                >—</span
              >
              <span class="summary-stat__label">Total Predictions</span>
            </div>
            <div class="summary-stat">
              <span class="summary-stat__value" id="stat-predictions-today"
                >—</span
              >
              <span class="summary-stat__label">Today</span>
            </div>
            <div class="summary-stat">
              <span class="summary-stat__value" id="stat-avg-confidence"
                >—</span
              >
              <span class="summary-stat__label">Avg Confidence</span>
            </div>
          </div>

          <!-- Controls: filter + export -->
          <div id="reports-controls" class="reports-controls">
            <label
              for="filter-from"
              style="
                font-size: 0.8125rem;
                color: var(--color-text-secondary);
                font-weight: 600;
              "
              >From</label
            >
            <input
              type="date"
              id="filter-from"
              class="form-input"
              style="width: auto; padding: 6px 10px"
            />

            <label
              for="filter-to"
              style="
                font-size: 0.8125rem;
                color: var(--color-text-secondary);
                font-weight: 600;
              "
              >To</label
            >
            <input
              type="date"
              id="filter-to"
              class="form-input"
              style="width: auto; padding: 6px 10px"
            />

            <button id="btn-apply-filter" class="btn btn--ghost btn--sm">
              Apply
            </button>
            <button id="btn-clear-filter" class="btn btn--ghost btn--sm">
              Clear
            </button>

            <button
              id="btn-export-bulk"
              class="btn btn--ghost btn--sm"
              style="margin-left: auto"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 20 20"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  fill-rule="evenodd"
                  d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
                  clip-rule="evenodd"
                />
              </svg>
              Export All CSV
            </button>
          </div>

          <!-- Loading skeletons -->
          <div
            id="reports-loading"
            style="
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
              gap: 16px;
            "
          >
            <div
              class="skeleton"
              style="height: 200px; border-radius: 10px"
            ></div>
            <div
              class="skeleton"
              style="height: 200px; border-radius: 10px"
            ></div>
            <div
              class="skeleton"
              style="height: 200px; border-radius: 10px"
            ></div>
          </div>

          <!-- Report cards grid -->
          <div id="reports-grid" class="reports-grid"></div>

          <!-- Empty state -->
          <div
            id="reports-empty"
            style="display: none"
            class="empty-state"
            aria-live="polite"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
              width="48"
              height="48"
              style="color: var(--color-text-secondary); margin-bottom: 12px"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"
              />
            </svg>
            <h2
              style="
                font-size: 1rem;
                margin: 0 0 4px;
                color: var(--color-text-primary);
              "
            >
              No reports found
            </h2>
            <p
              style="
                font-size: 0.8125rem;
                color: var(--color-text-secondary);
                margin: 0 0 16px;
              "
            >
              No reports match the current filter. Try clearing the date range
              or generate a new report.
            </p>
            <button
              class="btn btn--primary btn--sm"
              onclick="document.getElementById('btn-generate-report').click()"
            >
              Generate Report
            </button>
          </div>

          <!-- Pagination -->
          <div
            id="reports-pagination"
            class="pagination"
            aria-label="Reports pagination"
          ></div>
        </div>
        <!-- /.reports-page -->
      </main>
    </div>
    <!-- /#app-shell -->

    <!-- Generate Report Modal -->
    <div
      id="generate-report-modal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-box">
        <div class="modal-box__header">
          <h2 class="modal-box__title" id="modal-title">Generate Report</h2>
          <button
            class="modal-close"
            id="btn-modal-close"
            aria-label="Close modal"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                fill-rule="evenodd"
                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
        </div>

        <form id="generate-report-form" novalidate>
          <div class="modal-field">
            <label for="report-title-input">Report Title</label>
            <input
              type="text"
              id="report-title-input"
              class="form-input"
              placeholder="e.g. Daily Vitals Report"
              required
              maxlength="120"
            />
          </div>

          <div class="modal-field">
            <label for="report-patient-select">Patient</label>
            <select id="report-patient-select" class="form-input" required>
              <option value="">Select patient</option>
            </select>
          </div>

          <div class="modal-field">
            <label for="report-type-select">Report Type</label>
            <select id="report-type-select" class="form-input" required>
              <option value="">Select type</option>
              <option value="discharge">Discharge</option>
              <option value="vitals">Vitals</option>
              <option value="monitoring">Monitoring</option>
              <option value="diagnostic">Diagnostic</option>
            </select>
          </div>

          <div class="modal-field">
            <label for="report-summary-input">Summary</label>
            <textarea
              id="report-summary-input"
              class="form-input"
              placeholder="Report summary…"
              required
              maxlength="600"
            ></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" id="btn-modal-cancel" class="btn btn--ghost">
              Cancel
            </button>
            <button type="submit" class="btn btn--primary">Generate</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module">
      import { injectNav } from "./js/components/nav.js";
      import { showToast } from "./js/components/toast.js";
      import "./js/reports.js";

      injectNav(document.getElementById("nav-container"));

      window.addEventListener("unhandledrejection", (event) => {
        const err = event.reason;
        if (err?.status === 401) {
          window.location.href = "login.html";
          return;
        }
        showToast(err?.message || "An unexpected error occurred.", "error");
      });
    </script>
  </body>
</html>
